<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportLeague Manager | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="dashboard.html">
        <i class="bi bi-trophy-fill me-2"></i>SportLeague Manager
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="teams.html">Equipos</a></li>
          <li class="nav-item"><a class="nav-link" href="players.html">Jugadores</a></li>
          <li class="nav-item"><a class="nav-link" href="tournaments.html">Torneos</a></li>
          <li class="nav-item"><a class="nav-link" href="matches.html">Partidos</a></li>
        </ul>
        <span class="text-light small me-3" id="navbar-user"></span>
        <button class="btn btn-outline-light btn-sm" id="btn-logout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="container-fluid py-4">
      <div id="alert-container" class="mb-3"></div>
      <h2 class="fw-bold mb-4">Dashboard</h2>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { logout, preventBackAccess, requireAuth, showUserInNavbar } from "./assets/js/auth.js";
    preventBackAccess();
    requireAuth().then((user) => {
      showUserInNavbar(user);
      document.getElementById("btn-logout").addEventListener("click", logout);
    });
  </script>
</body>
</html>
