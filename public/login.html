<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> SportLeague Manager | Login </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="auth-icon"><i class="bi bi-trophy-fill"></i></span>
        <div>
          <h1>SportLeague Manager</h1>
          <p>Acceso administrativo</p>
        </div>
      </div>

      <div id="alert-container" class="mb-3"></div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-control" id="email" type="email" autocomplete="email" required />
          <div class="invalid-feedback" id="email-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-control" id="password" type="password" autocomplete="current-password" required />
          <div class="invalid-feedback" id="password-feedback">Ingresa tu contraseña.</div>
        </div>

        <button class="btn btn-primary w-100" id="btn-login" type="submit">
          Iniciar sesión
        </button>
      </form>

      <p class="auth-switch">
        ¿No tienes cuenta?
        <a href="register.html">Crear cuenta</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
