<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script>(function(){var t=localStorage.getItem('sl_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}());</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportLeague Manager | Crear cuenta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="auth-icon"><i class="bi bi-shield-fill"></i></span>
        <div>
          <h1>Crear cuenta</h1>
          <p>Registro para administradores de liga</p>
        </div>
      </div>

      <div id="alert-container" class="mb-3"></div>

      <form id="register-form" novalidate>
        <div class="mb-3">
          <label class="form-label" for="name">Nombre completo</label>
          <input class="form-control" id="name" type="text" autocomplete="name" required />
          <div class="invalid-feedback" id="name-feedback">Ingresa tu nombre.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-control" id="email" type="email" autocomplete="email" required />
          <div class="invalid-feedback" id="email-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-control" id="password" type="password" autocomplete="new-password" required />
          <div class="invalid-feedback" id="password-feedback">Mínimo 6 caracteres.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input class="form-control" id="confirm-password" type="password" autocomplete="new-password" required />
          <div class="invalid-feedback" id="confirm-feedback">Las contraseñas deben coincidir.</div>
        </div>

        <button class="btn btn-primary w-100" id="btn-register" type="submit">
          Crear cuenta
        </button>
      </form>

      <p class="auth-switch">
        ¿Ya tienes cuenta?
        <a href="login.html">Iniciar sesión</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFnWRWMgMjFc/z8eHMQk5Fac/o" crossorigin="anonymous"></script>
  <script type="module" src="assets/js/register.js"></script>
</body>
</html>
