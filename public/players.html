<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugadores | SportLeague Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="dashboard.html">
        <i class="bi bi-trophy-fill me-2"></i>SportLeague Manager
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="teams.html">Equipos</a></li>
          <li class="nav-item"><a class="nav-link active" href="players.html">Jugadores</a></li>
          <li class="nav-item"><a class="nav-link" href="tournaments.html">Torneos</a></li>
          <li class="nav-item"><a class="nav-link" href="matches.html">Partidos</a></li>
        </ul>
        <button class="btn btn-outline-light btn-sm" id="btn-logout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="container-fluid py-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Jugadores</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-player">
          <i class="bi bi-plus-lg me-1"></i>Nuevo jugador
        </button>
      </div>

      <div id="alert-container" class="mb-3"></div>

      <!-- Filtro -->
      <div class="mb-3 col-12 col-md-4">
        <select class="form-select" id="filter-team">
          <option value="">Todos los equipos</option>
        </select>
      </div>

      <!-- Tabla -->
      <div class="card border-0 shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Matrícula</th>
                <th>Posición</th>
                <th>Camiseta</th>
                <th>Equipo</th>
              </tr>
            </thead>
            <tbody id="players-tbody"></tbody>
          </table>
        </div>
        <div id="players-empty" class="p-4"></div>
      </div>

    </div>
  </main>

  <!-- Modal -->
  <div class="modal fade" id="modal-player" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo jugador</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="player-form" novalidate>

            <div class="mb-3">
              <label class="form-label fw-semibold">Equipo <span class="text-danger">*</span></label>
              <select class="form-select" id="teamId" required>
                <option value="">Selecciona un equipo</option>
              </select>
              <div class="invalid-feedback">Selecciona un equipo.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre completo <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fullName" required />
              <div class="invalid-feedback">Ingresa el nombre completo.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Matrícula <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="studentNumber" required />
              <div class="invalid-feedback">Ingresa la matrícula.</div>
            </div>

            <div class="row g-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Posición <span class="text-danger">*</span></label>
                <select class="form-select" id="position" required>
                  <option value="">Selecciona</option>
                  <option>Portero</option>
                  <option>Defensa</option>
                  <option>Mediocampista</option>
                  <option>Delantero</option>
                </select>
                <div class="invalid-feedback">Selecciona una posición.</div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Número de camiseta <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="shirtNumber" min="1" max="99" required />
                <div class="invalid-feedback">Número entre 1 y 99.</div>
              </div>
            </div>

          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btn-save">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFnWRWMgMjFc/z8eHMQk5Fac/o" crossorigin="anonymous"></script>
  <script type="module" src="assets/js/players.js"></script>
</body>
</html>
